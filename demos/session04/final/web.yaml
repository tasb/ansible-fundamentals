---
- name: Install and configure Nginx
  hosts: all
  become: yes  # Use privilege escalation to run tasks as root
  vars:
    static_files_path: "/opt/nginx/static"
  tasks:
    - name: Install the specified version of Nginx
      apt:
        name: "nginx={{ nginx_version }}"
        state: present
        update_cache: yes

    - name: Ensure the static files directory exists
      file:
        path: "{{ static_files_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Copy static files from control node to target
      copy:
        src: "./static/"
        dest: "{{ static_files_path }}"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Configure Nginx to handle /about route
      blockinfile:
        path: /etc/nginx/sites-available/default
        block: |
          location /about {
              alias {{ static_files_path }};
              try_files $uri $uri/ =404;
          }
        insertafter: "location / {"
        backup: yes

    - name: Reload Nginx to apply changes
      service:
        name: nginx
        state: reloaded
